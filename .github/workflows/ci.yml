name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Lint
        run: ruff check src tests

      - name: Format
        run: ruff format --check src tests

      - name: Typecheck
        run: mypy -p src

      - name: Unit tests
        run: pytest tests/unit -x --tb=short

      - name: Master-plane content invariant
        # Hard rule (CLAUDE.md #1): never bypass this test.
        run: pytest tests/unit/test_no_content_in_telemetry.py -x
